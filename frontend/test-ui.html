<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Nunito:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1E140D;
  --ink-2:#2A1D14;
  --ink-border:#4A3626;
  --sidebar-text:#F6E9DB;
  --sidebar-text-dim:#C9A98C;
  --accent:#BF5024;
  --accent-hover:#A8451C;
  --accent-light:#FFF8F2;
  --accent-soft:#FBE3D2;
  --bg:#FBF3EA;
  --card:#FFFFFF;
  --text:#3A2B22;
  --text-light:#6C5546;
  --text-muted:#7D6856;
  --border:#EEDCC7;
  --green:#206B3F;
  --green-soft:#EAF6EC;
  --red:#C93838;
  --purple:#7A4F8C;
  --purple-light:#F3E9F7;
  --shadow-sm:0 2px 8px rgba(120,72,32,.08);
  --shadow-md:0 8px 22px rgba(120,72,32,.12);
  --shadow-lg:0 24px 60px rgba(40,20,8,.35);
  --sidebar-w:272px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Nunito',sans-serif;background:var(--ink);color:var(--text);height:100vh;overflow:hidden}

/* SHELL */
.app-shell{display:flex;height:100vh;width:100vw}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);flex-shrink:0;background:linear-gradient(180deg,var(--ink) 0%,var(--ink-2) 100%);color:var(--sidebar-text);display:flex;flex-direction:column;height:100vh;border-right:1px solid var(--ink-border)}
.brand{display:flex;align-items:center;gap:12px;padding:22px 20px 18px}
.brand-mark{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#8F3814);display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:var(--shadow-sm);flex-shrink:0}
.brand-word{font-family:'Sora',sans-serif;font-size:16.5px;font-weight:600;letter-spacing:.01em;color:var(--sidebar-text)}
.brand-word strong{font-weight:800}
.sidebar-scroll{flex:1;overflow-y:auto;padding:6px 14px 14px}
.sidebar-label{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--sidebar-text-dim);padding:14px 10px 8px}
.sector-tabs{display:flex;flex-direction:column;gap:3px}
.sector-tab{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:10px 12px;border:1px solid transparent;border-radius:12px;cursor:pointer;font-family:inherit;font-size:13.5px;font-weight:600;background:transparent;color:var(--sidebar-text-dim);transition:all .15s;white-space:nowrap}
.sector-tab:hover{background:rgba(255,255,255,.07);color:var(--sidebar-text)}
.sector-tab.active{background:var(--accent);color:#fff;box-shadow:var(--shadow-sm)}
.sector-tab.create{margin-top:8px;border:1.5px dashed rgba(255,255,255,.28);color:var(--sidebar-text)}
.sector-tab.create:hover{background:var(--accent);border-style:solid;border-color:var(--accent);color:#fff}
.sector-tab.custom-tab{border:1px solid rgba(255,255,255,.18)}
.sector-tab.custom-tab.active{background:var(--accent);border-color:var(--accent)}
.sidebar-footer{padding:14px 20px;border-top:1px solid var(--ink-border);display:flex;flex-direction:column;gap:4px}
.sidebar-footer a{font-size:11px;color:var(--sidebar-text-dim);text-decoration:none;font-weight:600}
.sidebar-footer a:hover{color:#fff}

/* WORKSPACE */
.workspace{flex:1;min-width:0;display:flex;flex-direction:column;height:100vh;background:var(--bg)}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 28px;background:var(--card);border-bottom:1px solid var(--border)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-avatar{position:relative;width:44px;height:44px;border-radius:14px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:20px;border:2px solid var(--accent)}
.topbar-avatar::after{content:'';position:absolute;bottom:-3px;right:-3px;width:12px;height:12px;border-radius:50%;background:var(--green);border:2px solid var(--card);animation:livepulse 2s ease-in-out infinite}
@keyframes livepulse{0%,100%{box-shadow:0 0 0 0 rgba(32,107,63,.45)}50%{box-shadow:0 0 0 4px rgba(32,107,63,0)}}
.topbar-info .name{font-family:'Sora',sans-serif;font-size:16px;font-weight:700;color:var(--text)}
.topbar-info .status{font-size:12px;color:var(--green);font-weight:600;display:flex;align-items:center;gap:5px}
.topbar-info .status::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--green)}
.topbar-right{display:flex;gap:8px;align-items:center}
.sos-btn{background:var(--red);color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:var(--shadow-sm);transition:transform .12s,box-shadow .12s}
.sos-btn:hover{transform:translateY(-1px);box-shadow:var(--shadow-md)}
.icon-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-light);transition:all .15s}
.icon-btn:hover{background:var(--accent-light);border-color:var(--accent);color:var(--accent)}

/* MAIN AREA / LANDING */
.main-area{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;padding:40px 24px}
.landing{text-align:center;max-width:560px;width:100%;margin:auto 0}
.landing-icon{width:96px;height:96px;border-radius:28px;background:linear-gradient(160deg,var(--accent-soft),#fff);display:flex;align-items:center;justify-content:center;font-size:42px;margin:0 auto 22px;border:1px solid var(--border);box-shadow:var(--shadow-md)}
.landing-title{font-family:'Sora',sans-serif;font-size:27px;font-weight:700;margin-bottom:8px;color:var(--text)}
.landing-desc{font-size:14.5px;color:var(--text-muted);line-height:1.7;margin:0 auto 14px;max-width:440px}
.landing-badge{font-size:11px;color:var(--green);font-weight:700;margin-bottom:32px;display:inline-flex;align-items:center;gap:6px;background:var(--green-soft);padding:6px 14px;border-radius:20px}
.landing-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green)}
.section-label{font-size:11px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:14px}
.services{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:8px}
.service-btn{padding:12px 22px;border:1.5px solid var(--border);border-radius:16px;background:var(--card);color:var(--text);font-size:13.5px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s;box-shadow:var(--shadow-sm)}
.service-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light);transform:translateY(-2px)}
.service-btn.highlight{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.lang-hint{font-size:11.5px;color:var(--text-muted);margin-top:18px;line-height:1.6}

/* CHAT */
.chat-messages{flex:1;width:100%;max-width:680px;padding:4px}
.msg-row{display:flex;margin-bottom:18px}
.msg-row.user{justify-content:flex-end}
.msg-row.bot{justify-content:flex-start}
.msg-wrap{max-width:78%}
.bot-info{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.bot-av{width:24px;height:24px;border-radius:8px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:12px}
.bot-nm{font-size:11.5px;font-weight:700;color:var(--text-light)}
.bubble{padding:13px 18px;font-size:14px;line-height:1.7;white-space:pre-wrap}
.bubble.user{background:var(--accent);color:#fff;border-radius:18px 18px 4px 18px;box-shadow:var(--shadow-sm)}
.bubble.bot{background:var(--card);color:var(--text);border-radius:18px 18px 18px 4px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
.bubble.error{background:#FDEEEA;color:#A23B2E;border:1px solid #F3CFC2;border-radius:16px}
.bubble.escalated{background:#FFF6E0;color:#8A5A12;border:1px solid #F5DFAE;border-radius:16px}
.tags{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.tag{font-size:9.5px;font-family:'JetBrains Mono',monospace;padding:3px 9px;border-radius:8px;font-weight:500}
.t-int{background:var(--accent-light);color:var(--accent)}
.t-conf{background:#F3ECE4;color:var(--text-light)}
.t-esc{background:#FFF6E0;color:#8A5A12}
.t-src{background:var(--green-soft);color:#276B44}
.typing-row{display:flex;gap:5px;padding:13px 18px}
.t-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);opacity:.55;animation:tp 1.4s ease-in-out infinite}
.t-dot:nth-child(2){animation-delay:.2s}
.t-dot:nth-child(3){animation-delay:.4s}
@keyframes tp{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}

/* COMPOSER (lang bar + input) */
.composer{background:var(--card);border:1px solid var(--border);border-radius:22px;margin:0 24px 20px;padding:14px 22px 16px;display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow-md)}
.lang-bar{display:flex;align-items:center;gap:14px;font-size:11.5px;color:var(--text-light);flex-wrap:wrap}
.lang-field{display:flex;align-items:center;gap:8px}
.lang-field label{font-weight:700}
.lang-divider{color:var(--text-muted);font-size:13px}
.lang-select{padding:7px 10px;border:1.5px solid var(--border);border-radius:12px;font-size:12px;font-family:inherit;background:var(--bg);color:var(--text);outline:none;cursor:pointer;transition:border-color .15s;max-width:180px}
.lang-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light)}
.input-bar{display:flex;gap:12px;align-items:center}
.msg-input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:26px;padding:14px 22px;font-size:14px;font-family:inherit;outline:none;color:var(--text);transition:border-color .15s,box-shadow .15s}
.msg-input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-light);background:var(--card)}
.msg-input::placeholder{color:var(--text-muted)}
.send{width:48px;height:48px;border-radius:50%;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:var(--shadow-sm);transition:all .15s}
.send:hover:not(:disabled){background:var(--accent-hover);transform:scale(1.05)}
.send:disabled{opacity:.35;cursor:default}
.send svg{width:20px;height:20px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(20,12,6,.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(2px)}
.modal{background:var(--card);border-radius:24px;width:90%;max-width:540px;padding:34px;box-shadow:var(--shadow-lg);position:relative}
.modal-icon{width:44px;height:44px;border-radius:14px;background:var(--accent-soft);display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:14px}
.modal h2{font-family:'Sora',sans-serif;font-size:22px;font-weight:700;margin-bottom:6px;color:var(--text)}
.modal .sub{font-size:13px;color:var(--text-muted);margin-bottom:22px;line-height:1.6}
.modal label{font-size:12px;font-weight:700;color:var(--text-light);display:block;margin-bottom:6px}
.modal input{width:100%;padding:11px 16px;border:1.5px solid var(--border);border-radius:14px;font-size:14px;font-family:inherit;outline:none;margin-bottom:16px;color:var(--text);background:var(--bg);transition:border-color .15s,box-shadow .15s}
.modal input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-light);background:var(--card)}
.modal textarea{width:100%;height:180px;padding:14px 16px;border:1.5px solid var(--border);border-radius:14px;font-size:13px;font-family:inherit;outline:none;resize:vertical;color:var(--text);line-height:1.7;background:var(--bg);transition:border-color .15s,box-shadow .15s}
.modal textarea:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-light);background:var(--card)}
.modal .char-count{font-size:11px;color:var(--text-muted);text-align:right;margin-top:5px;margin-bottom:16px}
.modal .btn-row{display:flex;gap:10px;justify-content:flex-end}
.modal .btn-cancel{padding:11px 22px;border:1.5px solid var(--border);border-radius:16px;background:transparent;color:var(--text-light);font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.modal .btn-cancel:hover{background:var(--bg);border-color:var(--text-light)}
.modal .btn-create{padding:11px 26px;border:none;border-radius:16px;background:var(--accent);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:var(--shadow-sm);transition:all .15s}
.modal .btn-create:disabled{opacity:.4;cursor:default;box-shadow:none}
.modal .btn-create:hover:not(:disabled){background:var(--accent-hover);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.modal .loading{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--accent);margin-top:12px;font-weight:600}
.spin{width:17px;height:17px;border:2.5px solid var(--accent-light);border-top:2.5px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.sidebar ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18)}

/* RESPONSIVE: collapse sidebar to a top bar on narrow viewports */
@media (max-width:900px){
  .app-shell{flex-direction:column}
  .sidebar{width:100%;height:auto;flex-direction:row;align-items:center;border-right:none;border-bottom:1px solid var(--ink-border)}
  .brand{padding:12px 16px}
  .sidebar-scroll{flex:1;overflow-x:auto;overflow-y:hidden;padding:6px 10px;white-space:nowrap}
  .sector-tabs{flex-direction:row}
  .sidebar-label{display:none}
  .sidebar-footer{display:none}
  .workspace{height:auto;flex:1;min-height:0}
}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none"><path d="M12 3C7.03 3 3 6.58 3 11c0 2.36 1.14 4.47 2.96 5.94-.1 1.02-.47 2.3-1.4 3.6a.5.5 0 00.53.77c1.98-.5 3.5-1.33 4.47-2 .78.19 1.6.29 2.44.29 4.97 0 9-3.58 9-8s-4.03-8-9-8z" fill="currentColor"/></svg>

    <div class="sidebar-scroll">

      <nav class="sector-tabs" id="sector-tabs"></nav>
    </div>
    <div class="sidebar-footer">
      <a href="#">Powered by AgentPlatform</a>
      <a href="/docs">Admin console</a>
    </div>
  </aside>

  <main class="workspace">
    <header class="topbar">
      <div class="topbar-left">
        <div class="topbar-avatar" id="t-avatar"></div>
        <div class="topbar-info">
          <div class="name" id="t-name"></div>
          <div class="status" id="t-status"></div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="sos-btn" id="sos-btn" style="display:none" onclick="sendSOS()">SOS</button>
        <button class="icon-btn" onclick="clearChat()" title="New chat">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
    </header>

    <div class="main-area" id="main-area"></div>

    <div class="composer">
      <div class="lang-bar">
        <div class="lang-field">
          <label for="src-lang">Input</label>
          <select class="lang-select" id="src-lang"></select>
        </div>
        <div class="lang-divider">&rarr;</div>
        <div class="lang-field">
          <label for="tgt-lang">Output</label>
          <select class="lang-select" id="tgt-lang"></select>
        </div>
      </div>
      <div class="input-bar">
        <input class="msg-input" id="msg-input" placeholder="" onkeydown="if(event.key==='Enter')doSend()">
        <button class="send" id="send-btn" onclick="doSend()" disabled><svg viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" style="display:none">
  <div class="modal">
    <div class="modal-icon">&#10024;</div>
    <h2>Create Custom Persona</h2>
    <div class="sub">Paste your system prompt (max 2000 chars). The AI will extract features and create a chat agent.</div>
    <label>Agent name (optional)</label>
    <input id="m-name" placeholder="e.g. QuickKart Support, HealthBot" maxlength="100">
    <label>System prompt</label>
    <textarea id="m-prompt" placeholder="You are Roopa, a customer support agent at QuickKart, an e-commerce platform for electronics...

You handle order tracking, returns, refunds, and product inquiries.

Be warm and solution-oriented. Keep responses under 3 sentences.

For refunds, explain the 5-7 business day timeline..." maxlength="2000" oninput="updCount()"></textarea>
    <div class="char-count" id="m-count">0 / 2000</div>
    <div id="m-loading" style="display:none" class="loading"><div class="spin"></div>Extracting features from your prompt...</div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-create" id="m-create" onclick="createPersona()" disabled>Create agent</button>
    </div>
  </div>
</div>

const TGT_LANG_OPTS=SRC_LANG_OPTS.filter(o=>o.v!=="auto");

function fillLangSelect(id,opts,defaultVal){
  const el=document.getElementById(id);
  el.innerHTML=opts.map(o=>`<option value="${o.v}"${o.v===defaultVal?" selected":""}>${o.t}</option>`).join("");
}

function init(){
  renderTabs();
  pick(allSectors[0]);
  document.getElementById("msg-input").addEventListener("input",updBtn);
  fillLangSelect("src-lang",SRC_LANG_OPTS,"auto");
  fillLangSelect("tgt-lang",TGT_LANG_OPTS,"ENGLISH");
}

function renderTabs(){
  document.getElementById("sector-tabs").innerHTML=
    allSectors.map(s=>{
      const isCustom=s.id.startsWith("custom_");
      const cls=s.id===cur.id?"active":"";
      const extra=isCustom?"custom-tab":"";
      return`<button class="sector-tab ${cls} ${extra}" onclick="pick(allSectors.find(x=>x.id==='${s.id}'))">${s.icon} ${s.name}</button>`;
    }).join("")+
    `<button class="sector-tab create" onclick="openModal()">+ Choose Persona</button>`;
}

function pick(s){cur=s;sid=null;msgs=[];chatMode=false;busy=false;renderTabs();
  document.getElementById("t-avatar").textContent=s.icon;
  document.getElementById("t-name").textContent=s.company;
  document.getElementById("t-status").textContent="AI "+s.name+" Assistant \u00B7 Online";
  document.getElementById("msg-input").placeholder=s.ph||"Type a message...";
  document.getElementById("sos-btn").style.display=s.sos?"block":"none";
  render();document.getElementById("msg-input").focus()}

function render(){
  const a=document.getElementById("main-area");
  if(!chatMode||!msgs.length){
    a.innerHTML=`<div class="landing"><div class="landing-icon">${cur.icon}</div><div class="landing-title">${cur.company}</div><div class="landing-desc">${cur.desc}</div><div class="landing-badge">24/7 Customer Support</div><div class="section-label">Services</div><div class="services">${(cur.services||[]).map(s=>`<button class="service-btn ${s.h?'highlight':''}" onclick="tap('${s.t}')">${s.t}</button>`).join("")}</div>
    ${!cur.id.startsWith("custom_")?`<div class="lang-hint">\u{1F310} Chat in 100+ languages, including romanized/Hinglish-style options \u2014 pick Input/Output below.</div>`:
    `<div style="margin-top:10px;padding:12px 16px;background:var(--purple-light);border-radius:12px;font-size:12px;color:var(--purple);text-align:left;max-width:400px;margin-left:auto;margin-right:auto"><b>Custom persona</b> \u2014 This agent uses your custom prompt. <button style="background:none;border:none;color:var(--red);cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;margin-left:8px" onclick="deletePersona('${cur.id}')">Delete</button></div>`}</div>`;
    return}
  a.innerHTML=`<div class="chat-messages">${msgs.map(m=>{
    if(m.role==="user")return`<div class="msg-row user"><div class="msg-wrap"><div class="bubble user">${esc(m.text)}</div></div></div>`;
    let bc="bot";if(m.error)bc="error";if(m.escalated)bc="escalated";
    let tg="";if(m.intent)tg+=`<span class="tag t-int">${m.intent}</span><span class="tag t-conf">${Math.round(m.confidence*100)}%</span>`;
    if(m.escalated)tg+=`<span class="tag t-esc">escalated</span>`;if(m.srcCount)tg+=`<span class="tag t-src">${m.srcCount} sources</span>`;
    return`<div class="msg-row bot"><div class="msg-wrap"><div class="bot-info"><div class="bot-av">${cur.icon}</div><span class="bot-nm">${cur.agent}</span></div><div class="bubble ${bc}">${esc(m.text)}</div>${tg?`<div class="tags">${tg}</div>`:""}</div></div>`}).join("")}
  ${(busy&&!(msgs.length&&msgs[msgs.length-1].role==="bot"))?`<div class="msg-row bot"><div class="msg-wrap"><div class="bot-info"><div class="bot-av">${cur.icon}</div><span class="bot-nm">${cur.agent}</span></div><div class="bubble bot"><div class="typing-row"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div></div></div></div>`:""}</div>`;
  a.scrollTop=a.scrollHeight}

function tap(t){document.getElementById("msg-input").value=t;doSend()}
function sendSOS(){document.getElementById("msg-input").value="I have a medical emergency right now";doSend()}

async function doSend(){const inp=document.getElementById("msg-input"),text=inp.value.trim();if(!text||busy)return;inp.value="";updBtn();chatMode=true;msgs.push({role:"user",text});busy=true;render();
  const srcLang=document.getElementById("src-lang").value;
  const tgtLang=document.getElementById("tgt-lang").value;
  const botMsg={role:"bot",text:"",intent:null,confidence:null,escalated:false,srcCount:0,error:false};
  let pushed=false;
  try{
    const r=await fetch(`${API}/api/chat`,{method:"POST",headers:HDR,body:JSON.stringify({message:text,session_id:sid,sector:cur.id,src_lang:srcLang,lang:tgtLang,stream:true})});
    if(!r.ok||!r.body)throw new Error("bad response");
    const reader=r.body.getReader(),decoder=new TextDecoder();let buf="";
    while(true){
      const{value,done}=await reader.read();
      if(done)break;
      buf+=decoder.decode(value,{stream:true});
      let idx;
      while((idx=buf.indexOf("\n\n"))!==-1){
        const raw=buf.slice(0,idx);buf=buf.slice(idx+2);
        const line=raw.split("\n").find(l=>l.startsWith("data:"));
        if(!line)continue;
        let evt;try{evt=JSON.parse(line.slice(5).trim())}catch(e){continue}
        if(evt.type==="start"){if(evt.session_id)sid=evt.session_id}
        else if(evt.type==="chunk"){
          if(!pushed){msgs.push(botMsg);pushed=true}
          botMsg.text+=(botMsg.text?" ":"")+evt.text;render();
        }else if(evt.type==="done"){
          if(!pushed){msgs.push(botMsg);pushed=true}
          if(evt.session_id)sid=evt.session_id;
          botMsg.text=evt.reply;botMsg.intent=evt.intent;botMsg.confidence=evt.confidence;
          botMsg.escalated=evt.escalated;botMsg.srcCount=evt.sources?evt.sources.length:0;
          render();
        }else if(evt.type==="error"){
          if(!pushed){msgs.push(botMsg);pushed=true}
          botMsg.text=botMsg.text||"Something went wrong. Please try again.";botMsg.error=true;render();
        }
      }
    }
  }catch(e){
    if(!pushed)msgs.push({role:"bot",text:"Connection error. Is the server running?",error:true});
    else{botMsg.text="Connection error. Is the server running?";botMsg.error=true}
  }
  busy=false;render();inp.focus()}

async function clearChat(){if(sid)try{await fetch(`${API}/api/session/${sid}`,{method:"DELETE",headers:{"ngrok-skip-browser-warning":"true","X-API-Key":API_KEY}})}catch{}sid=null;msgs=[];chatMode=false;render()}

// MODAL
function openModal(){document.getElementById("modal").style.display="flex";document.getElementById("m-prompt").focus()}
function closeModal(){document.getElementById("modal").style.display="none";document.getElementById("m-name").value="";document.getElementById("m-prompt").value="";document.getElementById("m-loading").style.display="none";updCount()}
function updCount(){const n=document.getElementById("m-prompt").value.length;document.getElementById("m-count").textContent=n+" / 2000";document.getElementById("m-create").disabled=n<10}

async function createPersona(){
  const name=document.getElementById("m-name").value.trim();
  const prompt=document.getElementById("m-prompt").value.trim();
  if(prompt.length<10)return;
  document.getElementById("m-loading").style.display="flex";
  document.getElementById("m-create").disabled=true;
  try{
    const r=await fetch(`${API}/api/persona/create`,{method:"POST",headers:HDR,body:JSON.stringify({name,prompt})});
    const d=await r.json();
    const newSector={id:d.persona_id,name:d.name.slice(0,12),icon:d.icon,agent:d.agent_name,company:d.company,desc:d.description,services:d.services,ph:`Message ${d.agent_name}...`,custom:true};
    allSectors.push(newSector);
    closeModal();
    pick(newSector);
  }catch(e){alert("Failed to create persona. Is the server running?")}
  document.getElementById("m-loading").style.display="none";
  document.getElementById("m-create").disabled=false}

async function deletePersona(id){
  try{await fetch(`${API}/api/persona/${id}`,{method:"DELETE",headers:{"ngrok-skip-browser-warning":"true","X-API-Key":API_KEY}})}catch{}
  allSectors=allSectors.filter(s=>s.id!==id);
  pick(allSectors[0])}

function updBtn(){document.getElementById("send-btn").disabled=!document.getElementById("msg-input").value.trim()}
function esc(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
init();
</script>
